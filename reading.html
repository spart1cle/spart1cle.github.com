<body>

    <nav class="nav-container">
      <a class="nav-logo" href="index.html" aria-label="Home">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>

        <a href="index.html#about">About</a>

          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </button>

          <span></span><span></span><span></span>
        </button>

  </header>

  <main class="container">
    <section class="section reading-section">
      <h2 class="section-title">Reading List</h2>
      <p class="reading-subtitle">A selection of recent papers I've found interesting, sourced from my <a href="https://scholar-inbox.com" target="_blank" rel="noopener">Scholar Inbox</a>.</p>

      <div class="reading-controls">
        <div class="reading-search-wrap">
          <input type="text" id="reading-search" class="reading-search" placeholder="Search papers...">
          <button class="reading-search-clear" id="reading-search-clear" aria-label="Clear search">&times;</button>
        </div>
        <div class="reading-sort" id="reading-sort">
          <button class="sort-btn active" data-sort="published">Date Published</button>
          <button class="sort-btn" data-sort="relevance">Relevance</button>
        </div>
      </div>
      <div class="reading-layout">
        <aside class="reading-sidebar">
          <span class="reading-filter-label">Tags</span>
          <div class="reading-tag-list" id="reading-tag-filters"></div>
          <button class="reading-clear-btn" id="reading-clear" style="display:none">Clear filters</button>
        </aside>
        <div class="reading-main">
          <p class="reading-count" id="reading-count"></p>
          <div id="reading-list"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2025 Brandon B. May</p>
  </footer>

  <script>
    (function () {
      const listEl = document.getElementById('reading-list');
      const searchEl = document.getElementById('reading-search');
      const tagFiltersEl = document.getElementById('reading-tag-filters');
      const sortEl = document.getElementById('reading-sort');
      const countEl = document.getElementById('reading-count');
      const clearBtn = document.getElementById('reading-clear');
      let papers = [];
      let activeTags = new Set();
      let activeSort = 'published';
      let searchTimeout = null;

      fetch('papers.json')
        .then(r => r.json())
        .then(data => {
          papers = data;
          rebuildTagColors();
          renderTagFilters();
          initSort();
          initClear();
          readHash();
          renderPapers();
        })
        .catch(() => {
          listEl.innerHTML = '<p style="text-align:center;color:var(--color-text-secondary)">Could not load papers.</p>';
        });

      // ── Tag Colors ──────────────────────────────────────────
      const tagColorCache = {};
      function rebuildTagColors() {
        const allTags = [];
        const seen = {};
        papers.forEach(p => {
          (p.user_paper_collections || []).forEach(c => {
            if (!seen[c.name]) { seen[c.name] = true; allTags.push(c.name); }
          });
        });
        allTags.sort((a, b) => a.localeCompare(b));
        Object.keys(tagColorCache).forEach(k => delete tagColorCache[k]);
        const n = allTags.length || 1;
        for (let i = 0; i < allTags.length; i++) {
          const hue = Math.round(170 + (i * 110) / n);
          tagColorCache[allTags[i]] = `hsl(${hue}, 65%, 50%)`;
        }
      }
      function tagColor(name) {
        return tagColorCache[name] || 'hsl(0, 0%, 50%)';
      }

      function renderTagFilters() {
        const tagMap = {};
        papers.forEach(p => {
          (p.user_paper_collections || []).forEach(c => {
            if (!tagMap[c.name]) tagMap[c.name] = 0;
            tagMap[c.name]++;
          });
        });
        const likedCount = papers.filter(p => !(p.user_paper_collections || []).length).length;
        const sorted = Object.entries(tagMap).sort((a, b) => a[0].localeCompare(b[0]));
        tagFiltersEl.innerHTML =
          (likedCount ? `<button class="filter-btn tag-filter-btn" data-tag="__liked__" style="--tag-color:var(--color-accent)">&#x1F44D; Liked <span class="tag-count">${likedCount}</span></button>` : '') +
          sorted.map(([name, count]) =>
            `<button class="filter-btn tag-filter-btn" data-tag="${name}" style="--tag-color:${tagColor(name)}">${name} <span class="tag-count">${count}</span></button>`
          ).join('');
        tagFiltersEl.querySelectorAll('.tag-filter-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const tag = btn.dataset.tag;
            const wasActive = activeTags.has(tag);
            activeTags.clear();
            tagFiltersEl.querySelectorAll('.tag-filter-btn.active').forEach(b => b.classList.remove('active'));
            if (!wasActive) {
              activeTags.add(tag);
              btn.classList.add('active');
            }
            renderPapers();
          });
        });
      }

      function initSort() {
        sortEl.querySelectorAll('.sort-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            sortEl.querySelector('.active').classList.remove('active');
            btn.classList.add('active');
            activeSort = btn.dataset.sort;
            renderPapers();
          });
        });
      }

      function initClear() {
        clearBtn.addEventListener('click', () => {
          activeTags.clear();
          searchEl.value = '';
          tagFiltersEl.querySelectorAll('.tag-filter-btn.active').forEach(b => b.classList.remove('active'));
          renderPapers();
        });
      }

      const PAGE_SIZE = 20;
      let visibleCount = PAGE_SIZE;

      function renderPapers(resetPage) {
        if (resetPage !== false) visibleCount = PAGE_SIZE;
        const query = searchEl.value.toLowerCase();
        const filtered = papers.filter(p => {
          if (activeTags.size > 0) {
            const colls = p.user_paper_collections || [];
            const paperTags = new Set(colls.map(c => c.name));
            if (activeTags.has('__liked__') && colls.length > 0) return false;
            for (const t of activeTags) {
              if (t === '__liked__') continue;
              if (!paperTags.has(t)) return false;
            }
          }
          if (query) {
            const hay = (p.title + ' ' + p.authors + ' ' + (p.abstract || '')).toLowerCase();
            if (!hay.includes(query)) return false;
          }
          return true;
        });

        if (activeSort === 'published') {
          filtered.sort((a, b) => (b.publication_date || '').localeCompare(a.publication_date || ''));
        }
        // 'relevance' keeps the original API order (ranking_score)

        const hasFilters = activeTags.size > 0 || query;
        clearBtn.style.display = hasFilters ? '' : 'none';
        countEl.textContent = filtered.length === papers.length
          ? `${papers.length} papers`
          : `Showing ${filtered.length} of ${papers.length} papers`;

        if (!filtered.length) {
          listEl.innerHTML = '<p style="text-align:center;color:var(--color-text-secondary);padding:var(--space-xl) 0">No papers match your search.</p>';
          return;
        }

        const visible = filtered.slice(0, visibleCount);
        const hasMore = filtered.length > visibleCount;

        listEl.innerHTML = visible.map(p => {
          const date = p.publication_date || '';
          const authors = truncateAuthors(p.authors, 5);
          const colls = (p.user_paper_collections || []).slice().sort((a, b) => a.name.localeCompare(b.name));
          const collections = colls.length
            ? colls.map(c => `<span class="reading-tag" style="--tag-color:${tagColor(c.name)}">${c.name}</span>`).join('')
            : '<span class="reading-tag reading-tag-liked" style="--tag-color:var(--color-accent)">&#x1F44D; Liked</span>';
          const arxivUrl = p.arxiv_id ? `https://arxiv.org/abs/${p.arxiv_id}` : p.url;
          const abstract = p.abstract ? cleanAbstract(p.abstract) : '';
          const summaries = p.summaries || {};
          const contributions = summaries.contributions_question || '';
          const problem = summaries.problem_definition_question || '';
          const keywords = (p.keywords_metadata && p.keywords_metadata.keywords)
            ? p.keywords_metadata.keywords.split(',').map(k => k.trim()).filter(Boolean)
            : [];

          return `
            <article class="reading-card" data-id="${p.paper_id}">
              <div class="reading-card-header" onclick="this.parentElement.classList.toggle('expanded')">
                <div class="reading-card-meta">
                  <span class="reading-date">${date}</span>
                  ${p.category ? `<span class="reading-category">${p.category}</span>` : ''}
                  ${p.total_likes || p.total_read ? `<span class="reading-stats">${p.total_likes ? `<span title="Community likes"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg> ${p.total_likes}</span>` : ''}${p.total_read ? `<span title="Community reads"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg> ${p.total_read}</span>` : ''}</span>` : ''}
                </div>
                <h3 class="reading-card-title">${p.title}</h3>
                <p class="reading-card-authors">${authors}</p>
                <div class="reading-card-bottom">
                  <div class="reading-card-tags">${collections}</div>
                  <div class="reading-card-links" onclick="event.stopPropagation()">
                    ${arxivUrl ? `<a href="${arxivUrl}" target="_blank" rel="noopener">arXiv</a>` : ''}
                    ${p.url ? `<a href="${p.url}" target="_blank" rel="noopener">PDF</a>` : ''}
                    ${p.project_link && !p.project_link.includes('}{') ? `<a href="${p.project_link}" target="_blank" rel="noopener">Project</a>` : ''}
                  </div>
                </div>
                <svg class="reading-expand-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
              </div>
              <div class="reading-card-details"><div>
                ${contributions ? `<div class="reading-summary"><h4>Key Contributions</h4><div class="reading-summary-content">${renderMarkdown(contributions)}</div></div>` : ''}
                ${problem ? `<div class="reading-summary"><h4>Problem</h4><div class="reading-summary-content">${renderMarkdown(problem)}</div></div>` : ''}
                ${abstract ? `<details class="reading-abstract-toggle"><summary>Abstract</summary><p class="reading-abstract">${abstract}</p></details>` : ''}
                ${keywords.length ? `<div class="reading-keywords">${keywords.map(k => `<span class="reading-keyword">${k}</span>`).join('')}</div>` : ''}
              </div></div>
            </article>`;
        }).join('');

        if (hasMore) {
          listEl.insertAdjacentHTML('beforeend',
            `<button class="thoughts-load-more" id="reading-load-more">Load more (${filtered.length - visibleCount} remaining)</button>`);
          document.getElementById('reading-load-more').addEventListener('click', () => {
            visibleCount += PAGE_SIZE;
            renderPapers(false);
          });
        }

        if (window.revealElements) window.revealElements('.reading-card');
      }

      function truncateAuthors(str, max) {
        if (!str) return '';
        const parts = str.split(', ');
        if (parts.length <= max) return str;
        return parts.slice(0, max).join(', ') + ', et al.';
      }

      function cleanAbstract(text) {
        return text.replace(/<[^>]+>/g, '').replace(/\\href\{[^}]*\}\{([^}]*)\}/g, '$1');
      }

      function renderMarkdown(text) {
        return text
          .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
          .replace(/^- /gm, '<li>')
          .replace(/(<li>.*)/g, '$1</li>')
          .replace(/((<li>.*<\/li>\s*)+)/g, '<ul>$1</ul>');
      }

      const searchClearBtn = document.getElementById('reading-search-clear');
      searchEl.addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(renderPapers, 150);
        searchClearBtn.classList.toggle('visible', searchEl.value.length > 0);
      });
      searchClearBtn.addEventListener('click', () => {
        searchEl.value = '';
        searchClearBtn.classList.remove('visible');
        updateHash();
        renderPapers();
      });

      function updateHash() {
        const params = new URLSearchParams();
        if (activeTags.size) params.set('tag', [...activeTags][0]);
        if (searchEl.value) params.set('q', searchEl.value);
        const hash = params.toString();
        history.replaceState(null, '', hash ? '#' + hash : location.pathname);
      }

      function readHash() {
        const params = new URLSearchParams(location.hash.slice(1));
        const tag = params.get('tag');
        const q = params.get('q');
        if (tag) {
          activeTags.add(tag);
          const btn = tagFiltersEl.querySelector(`[data-tag="${tag}"]`);
          if (btn) btn.classList.add('active');
        }
        if (q) {
          searchEl.value = q;
          searchClearBtn.classList.add('visible');
        }
      }

      // Update hash when filters change
      const origRender = renderPapers;
      renderPapers = function (resetPage) {
        updateHash();
        origRender(resetPage);
      };
    })();
  </script>
