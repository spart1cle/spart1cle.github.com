  </header>

  <main class="container">
    <section class="section thoughts-section">
      <h2 class="section-title">Thoughts</h2>
      <p class="thoughts-subtitle">Notes, links, and fleeting ideas.</p>

      <div class="reading-controls">
        <div class="reading-search-wrap">
          <input type="text" id="thoughts-search" class="reading-search" placeholder="Search thoughts...">
          <button class="reading-search-clear" id="thoughts-search-clear" aria-label="Clear search">&times;</button>
        </div>
      </div>

      <div class="reading-layout">
        <aside class="reading-sidebar" id="thoughts-sidebar">
          <span class="reading-filter-label">Tags</span>
          <div class="reading-tag-list" id="thoughts-tag-filters"></div>
          <button class="reading-clear-btn" id="thoughts-clear" style="display:none">Clear filters</button>
        </aside>
        <div class="reading-main">
          <p class="reading-count" id="thoughts-count"></p>
          <div id="thoughts-list"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- Compose FAB (hidden by default) -->
  <button class="thoughts-fab" id="thoughts-fab" style="display:none" aria-label="New thought">+</button>

  <!-- Compose Modal -->
  <div class="thoughts-modal-overlay" id="thoughts-modal" style="display:none">
    <div class="thoughts-modal">
      <div class="thoughts-modal-header">
        <h3>New Thought</h3>
        <button class="thoughts-modal-close" id="thoughts-modal-close">&times;</button>
      </div>
      <form id="thoughts-form">
        <div class="thoughts-form-fields" id="thoughts-form-fields">
          <div class="thoughts-toolbar" id="thoughts-toolbar">
            <button type="button" data-fmt="bold" title="Bold (Ctrl+B)"><strong>B</strong></button>
            <button type="button" data-fmt="italic" title="Italic (Ctrl+I)"><em>I</em></button>
            <span class="thoughts-toolbar-sep"></span>
            <button type="button" data-fmt="link" title="Link (Ctrl+K)">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
            </button>
            <button type="button" data-fmt="quote" title="Blockquote">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="3" y2="18"></line><line x1="8" y1="8" x2="21" y2="8"></line><line x1="8" y1="16" x2="18" y2="16"></line></svg>
            </button>
            <span class="thoughts-toolbar-sep"></span>
            <button type="button" data-fmt="code" title="Inline code"><code>&lt;/&gt;</code></button>
            <button type="button" data-fmt="codeblock" title="Code block">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
            </button>
            <span class="thoughts-toolbar-sep"></span>
            <button type="button" data-fmt="math" title="Inline LaTeX">$</button>
            <button type="button" data-fmt="mathblock" title="LaTeX block">$$</button>
          </div>
          <textarea id="thought-text" class="thoughts-textarea" placeholder="What's on your mind?" rows="4"></textarea>
          <div class="thoughts-url-field">
            <input type="url" id="thought-url" class="reading-search" placeholder="Link URL (optional)">
          </div>
          <div class="thoughts-tags-field">
            <div class="thoughts-existing-tags" id="thoughts-existing-tags"></div>
            <div class="thoughts-new-tags" id="thoughts-new-tags"></div>
            <input type="text" id="thought-tags" class="reading-search" placeholder="Add new tag...">
          </div>
          <div class="thoughts-preview" id="thoughts-preview" style="display:none">
            <span class="reading-filter-label">Preview</span>
            <div class="thoughts-preview-content" id="thoughts-preview-content"></div>
          </div>
          <div class="thoughts-submit-row" id="thoughts-submit-row">
            <button type="button" class="thoughts-submit-btn" id="thoughts-publish-btn">Publish</button>
          </div>
        </div>
        <div class="thoughts-confirm-preview" id="thoughts-confirm-preview">
          <span class="reading-filter-label">Ready to publish</span>
          <div id="thoughts-confirm-card"></div>
          <div class="thoughts-confirm-row" style="margin-top: var(--space-md)">
            <button type="submit" class="thoughts-submit-btn thoughts-confirm-btn" id="thoughts-confirm-btn">Confirm</button>
            <button type="button" class="thoughts-submit-btn thoughts-cancel-btn" id="thoughts-cancel-btn">Cancel</button>
          </div>
        </div>
        <p class="thoughts-status" id="thoughts-status"></p>
      </form>
    </div>
  </div>

  <!-- Auth settings button -->
  <button class="thoughts-auth-btn" id="thoughts-auth-btn" aria-label="Settings">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
  </button>

</html>
