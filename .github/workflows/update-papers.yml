name: Update Reading List

on:
  schedule:
    - cron: '0 8 * * *'  # Every day at 8am UTC
  workflow_dispatch:  # Manual trigger

jobs:
  update-papers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Fetch papers from Scholar Inbox
        run: python3 fetch_papers.py --cookie "session=${{ secrets.SCHOLAR_INBOX_SESSION }}" --output papers.json --pages 3 --limit 30

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet papers.json && exit 0
          git add papers.json
          git commit -m "Update reading list papers"
          git push
