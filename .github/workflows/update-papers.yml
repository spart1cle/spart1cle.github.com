name: Update Reading List

on:
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours
  workflow_dispatch:  # Manual trigger

jobs:
  update-papers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Fetch papers from Scholar Inbox
        run: python3 fetch_papers.py --cookie "session=${{ secrets.SCHOLAR_INBOX_SESSION }}" --output papers.json --pages 3 --limit 50

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet papers.json && echo "changed=false" >> "$GITHUB_OUTPUT" && exit 0
          git add papers.json
          git commit -m "Update reading list papers"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Notify new papers to Slack
        if: steps.commit.outputs.changed == 'true'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: python3 notify_papers_slack.py
