name: Sync Thoughts to Slack

on:
  push:
    branches: [main]
    paths: [thoughts.json]
  workflow_dispatch:
    inputs:
      thought_id:
        description: 'Single thought ID to push to Slack'
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Sync thought changes to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          THOUGHT_ID: ${{ github.event.inputs.thought_id }}
        run: python3 notify_slack.py

      - name: Generate Atom feed
        if: github.event_name == 'push'
        run: python3 generate_feed.py

      - name: Commit feed if changed
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feed.xml
          git diff --cached --quiet || git commit -m "Update Atom feed" && git push
